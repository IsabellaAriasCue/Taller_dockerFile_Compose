services:

  db:
    image: postgres:15 #Modifique esto porque no sabía que ya contaba con la Version 15

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: videojuegos

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:

    build: .

    ports:
      - "8001:8000"

    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: videojuegos

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: